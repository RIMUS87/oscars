<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | CodewithRomi</title>
  <style>
    body { font-family: Arial, sans-serif; background: #1f1f1f; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    form { background: #2a2a2a; padding: 20px; border-radius: 8px; }
    input { display: block; margin-bottom: 10px; padding: 10px; width: 250px; }
    button { padding: 10px 20px; background: #00d9ff; border: none; color: white; cursor: pointer; }
    .message { margin-top: 15px; }
  </style>
</head>
<body>
  <h2>Login to Your Account</h2>
  <form id="login-form">
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit">Login</button>
    <div class="message" id="message"></div>
  </form>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
