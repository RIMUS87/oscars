<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Firebase Auth Login</title>
</head>
<body>
  <h2>Login or Register</h2>
  <form id="auth-form">
    <input type="email" id="email" placeholder="Email" required><br><br>
    <input type="password" id="password" placeholder="Password" required><br><br>
    <button type="button" id="login-btn">Login</button>
    <button type="button" id="register-btn">Register</button>
  </form>

  <p id="status-message"></p>

  <script type="module">
    // Import Firebase modules (Replace with CDN paths or bundler imports)
    import { initializeApp } from "firebase/app";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "firebase/auth";

    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY_HERE", // Retrieve this from your Firebase Console project settings
      authDomain: "user-login-dcf87.firebaseapp.com",
      projectId: "user-login-dcf87",
      storageBucket: "user-login-dcf87.firebasestorage.app",
      messagingSenderId: "233272683489",
      appId: "YOUR_APP_ID_HERE"   // Retrieve this from your Firebase Console project settings
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Get DOM Elements
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const registerBtn = document.getElementById('register-btn');
    const statusMessage = document.getElementById('status-message');

    // Register User
    registerBtn.addEventListener('click', () => {
      const email = emailInput.value;
      const password = passwordInput.value;
      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          statusMessage.innerText = `Registered: ${userCredential.user.email}`;
        })
        .catch((error) => {
          statusMessage.innerText = `Error: ${error.message}`;
        });
    });

    // Login User
    loginBtn.addEventListener('click', () => {
      const email = emailInput.value;
      const password = passwordInput.value;
      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          statusMessage.innerText = `Logged in: ${userCredential.user.email}`;
        })
        .catch((error) => {
          statusMessage.innerText = `Error: ${error.message}`;
        });
    });
  </script>

</body>
</html>
